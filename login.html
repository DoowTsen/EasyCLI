<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' tauri:; style-src 'self' 'unsafe-inline'; connect-src 'self' http: https: tauri: ipc:" />
    <meta http-equiv="X-Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' tauri:; style-src 'self' 'unsafe-inline'; connect-src 'self' http: https: tauri: ipc:" />
    <title>EasyCLI</title>
    <link rel="stylesheet" href="css/login.css">

    <script src="js/config-manager.js"></script>
    <script>
        // Dev convenience: reload on Cmd/Ctrl+R
        window.addEventListener('keydown', function (e) {
            if ((e.metaKey || e.ctrlKey) && (e.key === 'r' || e.key === 'R')) {
                e.preventDefault();
                location.reload();
            }
        });

        (async () => {
            try {
                // Disable maximize on Windows to match desktop UX
                const isWindows = navigator.userAgent.toLowerCase().includes('windows');
                const getCurrentWindow = window.__TAURI__?.window?.getCurrent;
                if (isWindows && typeof getCurrentWindow === 'function') {
                    const currentWindow = getCurrentWindow();
                    if (currentWindow && typeof currentWindow.setMaximizable === 'function') {
                        await currentWindow.setMaximizable(false);
                    }
                }
            } catch (err) {
                console.warn('Disable maximize failed:', err);
            }
        })();
    </script>
</head>

<body>

    <div class="cards-container">
        <div class="card selected" id="local-card">
            <div class="card-icon">💻</div>
            <h2 class="card-title">本地</h2>
            <p class="card-description">在本机运行 CLIProxyAPI 服务。</p>
        </div>

        <div class="card" id="remote-card">
            <div class="card-icon">🌐</div>
            <h2 class="card-title">远程</h2>
            <p class="card-description">连接并管理远程 CLIProxyAPI 服务。</p>
        </div>
    </div>

    <div class="remote-url-section" id="remote-url-section">
        <div class="remote-url-label">远程地址：</div>
        <input type="text" class="remote-url-input" id="remote-url-input" value="http://www.example.com:8317" />
        <div class="password-label">管理密钥：</div>
        <input type="password" class="password-input" id="password-input" placeholder="请输入管理密钥" />
    </div>

    <div class="proxy-section" id="proxy-section">
        <div class="proxy-label">代理服务器（可选）：</div>
        <input type="text" class="proxy-input" id="proxy-input"
            placeholder="http://host:port 或 https://host:port 或 socks5://user:pass@host:port" />
        <div class="proxy-help">支持 HTTP、HTTPS、SOCKS5 代理</div>
    </div>

    <button class="continue-btn" id="continue-btn">连接</button>

    <div class="progress-container" id="progress-container">
        <div class="progress-label" id="progress-label">正在下载 CLIProxyAPI...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0%</div>
    </div>

    <div class="error-toast" id="error-toast"></div>
    <div class="success-toast" id="success-toast"></div>

    <div class="update-dialog" id="update-dialog">
        <div class="update-dialog-content">
            <div class="update-dialog-title">发现新版本</div>
            <div class="update-dialog-message" id="update-dialog-message">
                检测到新版本，是否更新到最新版本？
            </div>
            <div class="update-dialog-buttons">
                <button class="update-dialog-btn cancel" id="update-cancel-btn">稍后更新</button>
                <button class="update-dialog-btn update" id="update-confirm-btn">立即更新</button>
            </div>
        </div>
    </div>

    <div class="update-dialog" id="helper-update-dialog">
        <div class="update-dialog-content">
            <div class="update-dialog-title">发现 CPA-Helper 新版本</div>
            <div class="update-dialog-message" id="helper-update-dialog-message">
                检测到 CPA-Helper 新版本，是否更新到最新版本？
            </div>
            <div class="update-dialog-buttons">
                <button class="update-dialog-btn cancel" id="helper-update-cancel-btn">稍后更新</button>
                <button class="update-dialog-btn update" id="helper-update-confirm-btn">立即更新</button>
            </div>
        </div>
    </div>

    <div class="password-dialog" id="password-dialog">
        <div class="password-dialog-content">
            <div class="password-dialog-title">设置远程管理密码</div>
            <div class="password-dialog-message">
                出于安全考虑，请为远程管理功能设置管理密钥。
            </div>
            <div class="password-input-group">
                <label class="password-input-label" for="password-input-1">管理密钥：</label>
                <input type="password" class="password-input-field" id="password-input-1"
                    placeholder="请输入管理密钥">
            </div>
            <div class="password-input-group">
                <label class="password-input-label" for="password-input-2">确认管理密钥：</label>
                <input type="password" class="password-input-field" id="password-input-2"
                    placeholder="请再次输入管理密钥">
            </div>
            <div class="password-dialog-buttons">
                <button class="password-dialog-btn cancel" id="password-cancel-btn">取消</button>
                <button class="password-dialog-btn save" id="password-save-btn">保存</button>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
